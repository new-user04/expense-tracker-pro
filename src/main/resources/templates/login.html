<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Expense Tracker Pro - Login</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:linear-gradient(
                    135deg,
                    #4f46e5,
                    #3b82f6);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:420px;
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            padding:30px;
            background:white;
        }

        .logo{
            font-size:50px;
            color:#4f46e5;
        }

        .btn-login{
            background:#4f46e5;
            border:none;
            border-radius:10px;
        }

        .btn-login:hover{
            background:#4338ca;
        }

    </style>

</head>

<body>

<div class="card login-card">

    <div class="text-center">

        <i class="bi bi-wallet2 logo"></i>

        <h2 class="mt-3">
            Expense Tracker Pro
        </h2>

        <p class="text-muted">
            Login to continue
        </p>

    </div>

    <form th:action="@{/login}"
          method="post">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   required>

        </div>

        <button type="submit"
                class="btn btn-login text-white w-100">

            Login

        </button>

    </form>

    <div th:if="${param.error}"
         class="alert alert-danger mt-3">

        Invalid Username or Password

    </div>

    <div th:if="${param.logout}"
         class="alert alert-success mt-3">

        Logged out successfully

    </div>

</div>

</body>

</html>
