<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Expense | Expense Tracker Pro</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">

            <i class="bi bi-wallet2"></i>
            Expense Tracker Pro

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card p-5">

                <h2 class="mb-4 text-center">

                    <i class="bi bi-pencil-square"></i>

                    Edit Expense

                </h2>

                <form action="/update"
                      method="post">

                    <input type="hidden"
                           name="id"
                           th:value="${expense.id}">

                    <div class="mb-3">

                        <label class="form-label">

                            Expense Title

                        </label>

                        <input type="text"
                               name="title"
                               th:value="${expense.title}"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Amount

                        </label>

                        <input type="number"
                               step="0.01"
                               name="amount"
                               th:value="${expense.amount}"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Category

                        </label>

                        <select name="category"
                                class="form-select">

                            <option th:selected="${expense.category=='Food'}">
                                Food
                            </option>

                            <option th:selected="${expense.category=='Travel'}">
                                Travel
                            </option>

                            <option th:selected="${expense.category=='Shopping'}">
                                Shopping
                            </option>

                            <option th:selected="${expense.category=='Bills'}">
                                Bills
                            </option>

                            <option th:selected="${expense.category=='Education'}">
                                Education
                            </option>

                            <option th:selected="${expense.category=='Entertainment'}">
                                Entertainment
                            </option>

                            <option th:selected="${expense.category=='Other'}">
                                Other
                            </option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Date

                        </label>

                        <input type="date"
                               name="expenseDate"
                               th:value="${expense.expenseDate}"
                               class="form-control"
                               required>

                    </div>

                    <div class="d-flex gap-2">

                        <button class="btn btn-success">

                            <i class="bi bi-check-circle"></i>

                            Update Expense

                        </button>

                        <a href="/"
                           class="btn btn-secondary">

                            <i class="bi bi-arrow-left"></i>

                            Back

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
