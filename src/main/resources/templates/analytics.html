<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Analytics | Expense Tracker Pro</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">

            <i class="bi bi-wallet2"></i>
            Expense Tracker Pro

        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link text-white"
               href="/">
                Dashboard
            </a>

            <a class="nav-link text-white"
               href="/expenses">
                Expenses
            </a>

            <a class="nav-link text-white"
               href="/analytics">
                Analytics
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">

        Expense Analytics

    </h1>

    <div class="card p-4 mb-4">

        <h3>Category Wise Expense Distribution</h3>

        <canvas id="expenseChart"></canvas>

    </div>

    <div class="row g-4">

        <div class="col-md-3">

            <div class="card p-4 text-center">

                <h5>Food</h5>

                <h3 class="text-success">

                    ₹ <span th:text="${food}"></span>

                </h3>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-4 text-center">

                <h5>Travel</h5>

                <h3 class="text-primary">

                    ₹ <span th:text="${travel}"></span>

                </h3>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-4 text-center">

                <h5>Shopping</h5>

                <h3 class="text-warning">

                    ₹ <span th:text="${shopping}"></span>

                </h3>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-4 text-center">

                <h5>Bills</h5>

                <h3 class="text-danger">

                    ₹ <span th:text="${bills}"></span>

                </h3>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

const food = [[${food}]];
const travel = [[${travel}]];
const shopping = [[${shopping}]];
const bills = [[${bills}]];
const education = [[${education}]];
const entertainment = [[${entertainment}]];
const other = [[${other}]];

const ctx =
document.getElementById('expenseChart');

new Chart(ctx, {

    type: 'doughnut',

    data: {

        labels: [
            'Food',
            'Travel',
            'Shopping',
            'Bills',
            'Education',
            'Entertainment',
            'Other'
        ],

        datasets: [{

            data: [
                food,
                travel,
                shopping,
                bills,
                education,
                entertainment,
                other
            ],

            backgroundColor: [
                '#4CAF50',
                '#2196F3',
                '#FFC107',
                '#F44336',
                '#9C27B0',
                '#00BCD4',
                '#607D8B'
            ]
        }]
    },

    options: {

        responsive: true,

        plugins: {

            legend: {
                position: 'bottom'
            }

        }

    }

});

</script>

</body>
</html>
