<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Expenses | Expense Tracker Pro</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="/">

            <i class="bi bi-wallet2"></i>
            Expense Tracker Pro

        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link text-white"
               href="/">
                Dashboard
            </a>

            <a class="nav-link text-white"
               href="/expenses">
                Expenses
            </a>

            <a class="nav-link text-white"
               href="/analytics">
                Analytics
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">

        Expense Management

    </h1>

    <!-- Add Expense -->

    <div class="card p-4 mb-4">

        <h3>Add Expense</h3>

        <form action="/save"
              method="post">

            <input type="text"
                   name="title"
                   placeholder="Expense Title"
                   class="form-control mb-3"
                   required>

            <input type="number"
                   step="0.01"
                   name="amount"
                   placeholder="Amount"
                   class="form-control mb-3"
                   required>

            <select name="category"
                    class="form-select mb-3">

                <option>Food</option>
                <option>Travel</option>
                <option>Shopping</option>
                <option>Bills</option>
                <option>Education</option>
                <option>Entertainment</option>
                <option>Other</option>

            </select>

            <input type="date"
                   name="expenseDate"
                   class="form-control mb-3"
                   required>

            <button class="btn btn-primary">
                Add Expense
            </button>

        </form>

    </div>

    <!-- Expense Table -->

    <div class="card p-4">

        <div class="d-flex justify-content-between align-items-center">

            <h3>All Expenses</h3>

            <a href="/export"
               class="btn btn-success">

                <i class="bi bi-download"></i>
                Export CSV

            </a>

        </div>

        <hr>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Title</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Actions</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="expense : ${expenses}">

                <td th:text="${expense.id}"></td>

                <td th:text="${expense.title}"></td>

                <td>
                    ₹ <span th:text="${expense.amount}"></span>
                </td>

                <td th:text="${expense.category}"></td>

                <td th:text="${#temporals.format(expense.expenseDate,'dd-MM-yyyy')}"></td>

                <td>

                    <a class="btn btn-warning btn-sm"
                       th:href="@{/edit/{id}(id=${expense.id})}">
                        Edit
                    </a>

                    <a class="btn btn-danger btn-sm"
                       th:href="@{/delete/{id}(id=${expense.id})}">
                        Delete
                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
